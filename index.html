<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#5D4037">
  <meta name="description" content="🧋 奶茶调配助手 - 一步步教你做奶茶">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="奶茶调配">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧋</text></svg>">
  <title>🧋 奶茶调配助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --boba-brown: #5D4037;
      --cream: #FFF8F0;
      --caramel: #D4A574;
      --tea-green: #7CB342;
      --text-dark: #3E2723;
      --text-light: #8D6E63;
      --white: #FFFFFF;
      --danger: #e53935;
      --shadow: 0 4px 12px rgba(93, 64, 55, 0.15);
      --shadow-hover: 0 8px 24px rgba(93, 64, 55, 0.2);
      --bg: var(--cream);
      --card-bg: var(--white);
      --input-bg: var(--cream);
      --border: #d4c4b7;
      --text-primary: var(--text-dark);
      --text-secondary: var(--text-light);
    }
    [data-theme="dark"] {
      --boba-brown: #8D6E63;
      --cream: #1E1410;
      --caramel: #A67C52;
      --tea-green: #558B2F;
      --text-dark: #F5F0EB;
      --text-light: #A89890;
      --white: #2C2118;
      --danger: #EF5350;
      --shadow: 0 4px 12px rgba(0, 0, 0, 0.4);
      --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.5);
      --bg: #1A120C;
      --card-bg: #2C2118;
      --input-bg: #241A13;
      --border: #4A3A2E;
      --text-primary: #F5F0EB;
      --text-secondary: #A89890;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* Header */
    .header {
      background: var(--card-bg);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid var(--caramel);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-back { background: none; border: none; font-size: 24px; cursor: pointer; padding: 8px; margin: -8px; border-radius: 8px; transition: background 0.2s; }
    .header-back:active { background: rgba(0,0,0,0.1); }
    .header-title { flex: 1; font-weight: 700; font-size: 18px; }
    .header-subtitle { font-size: 13px; color: var(--text-secondary); font-weight: 400; }
    .header-add { background: none; border: none; font-size: 22px; cursor: pointer; padding: 8px; border-radius: 8px; transition: background 0.2s; }
    .header-add:active { background: rgba(0,0,0,0.1); }
    .header-sound { background: none; border: none; font-size: 20px; cursor: pointer; padding: 8px; border-radius: 8px; transition: background 0.2s; position: relative; }
    .header-sound:active { background: rgba(0,0,0,0.1); }
    .header-sound.muted { opacity: 0.4; }
    .header-sound .sound-tooltip { display: none; position: absolute; top: 100%; right: 0; background: var(--boba-brown); color: white; font-size: 12px; padding: 4px 8px; border-radius: 6px; white-space: nowrap; z-index: 10; margin-top: 4px; }
    .header-sound:hover .sound-tooltip { display: block; }
    .voice-toggle { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg); border-radius: 10px; margin-bottom: 16px; font-size: 14px; }
    .voice-toggle button { flex: 1; padding: 8px; border-radius: 8px; border: 2px solid transparent; font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.15s; }
    .voice-toggle button.active { border-color: var(--boba-brown); background: var(--card-bg); font-weight: 700; }
    .voice-toggle button:not(.active) { background: none; color: var(--text-secondary); }

    /* Page */
    .page { display: none; animation: fadeIn 0.3s ease-out; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

    /* Home Page */
    .home-page { padding: 20px; }
    .drink-card .fav-btn { background: none; border: none; font-size: 18px; cursor: pointer; padding: 4px 6px; border-radius: 6px; transition: transform 0.1s; }
    .drink-card .fav-btn:active { transform: scale(1.3); }
    .drink-card .fav-btn.faved { color: #f5a623; }
    .fav-section { margin-bottom: 20px; }
    .fav-section-title { font-size: 14px; color: var(--tea-green); font-weight: 500; margin-bottom: 12px; padding-left: 4px; display: flex; align-items: center; gap: 6px; }
    .fav-drink-card { background: var(--card-bg); border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 14px; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s; border: none; width: 100%; text-align: left; font-family: inherit; }
    .fav-drink-card:active { transform: scale(0.98); box-shadow: var(--shadow-hover); }
    .fav-drink-card .drink-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .fav-drink-card .edit-btn { background: none; border: none; font-size: 15px; cursor: pointer; padding: 4px 6px; border-radius: 6px; }
    .fav-drink-card .edit-btn:active { background: rgba(0,0,0,0.1); }
    .fav-drink-card .delete-btn { background: none; border: none; font-size: 15px; cursor: pointer; padding: 4px 6px; border-radius: 6px; color: var(--danger); }
    .fav-drink-icon { font-size: 32px; flex-shrink: 0; }
    .fav-drink-info { flex: 1; }
    .fav-drink-name { font-weight: 700; font-size: 16px; }
    .search-enhance { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-box { background: var(--card-bg); border: 2px solid transparent; border-radius: 12px; padding: 14px 16px; font-size: 16px; font-family: inherit; flex: 1; box-shadow: var(--shadow); transition: border-color 0.2s; outline: none; }
    .search-box:focus { border-color: var(--caramel); }
    .filter-btn { background: var(--card-bg); border: 2px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 15px; cursor: pointer; font-family: inherit; transition: all 0.2s; white-space: nowrap; }
    .filter-btn:active { background: rgba(0,0,0,0.05); }
    .filter-btn.active { border-color: var(--caramel); background: var(--bg); }
    .category-filter-panel { display: none; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; padding: 12px; background: var(--card-bg); border-radius: 12px; box-shadow: var(--shadow); }
    .category-filter-panel.open { display: flex; }
    .filter-chip { padding: 6px 12px; border-radius: 20px; border: 2px solid var(--border); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: inherit; background: none; }
    .filter-chip:hover { border-color: var(--caramel); }
    .filter-chip.selected { border-color: var(--caramel); background: var(--caramel); color: white; }
    .search-no-result { text-align: center; padding: 32px 20px; color: var(--text-secondary); }
    .search-no-result span { display: block; margin-bottom: 12px; font-size: 40px; }
    .category { margin-bottom: 28px; }
    .category-title { font-size: 14px; color: var(--text-secondary); font-weight: 500; margin-bottom: 12px; padding-left: 4px; }
    .drink-grid { display: flex; flex-direction: column; gap: 12px; }
    .drink-card { background: var(--card-bg); border-radius: 16px; padding: 18px 20px; display: flex; align-items: center; gap: 16px; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.15s, box-shadow 0.15s; border: none; width: 100%; text-align: left; font-family: inherit; }
    .drink-card:active { transform: scale(0.98); box-shadow: var(--shadow-hover); }
    .drink-card .drink-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .drink-card .edit-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
    .drink-card .edit-btn:active { background: rgba(0,0,0,0.1); }
    .drink-card .delete-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 4px 8px; border-radius: 6px; color: var(--danger); }
    .drink-icon { font-size: 36px; flex-shrink: 0; }
    .drink-info { flex: 1; }
    .drink-name { font-weight: 700; font-size: 17px; margin-bottom: 4px; }
    .drink-intro { font-size: 13px; color: var(--text-secondary); }
    .drink-arrow { font-size: 20px; color: var(--caramel); }
    .no-result { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
    .footer-status { text-align: center; padding: 24px; font-size: 13px; color: var(--text-secondary); }

    /* Step Page */
    .step-page { padding: 20px; }
    .progress-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 28px; }
    .progress-dot { width: 10px; height: 10px; border-radius: 50%; background: #d4c4b7; transition: all 0.3s ease; }
    .progress-dot.done { background: var(--caramel); width: 8px; height: 8px; }
    .progress-dot.current { background: var(--boba-brown); width: 14px; height: 14px; }
    .step-card { background: var(--card-bg); border-radius: 20px; padding: 32px 24px; text-align: center; box-shadow: var(--shadow); margin-bottom: 24px; }
    .step-icon { font-size: 72px; margin-bottom: 16px; display: block; animation: stepBounce 0.4s ease-out; }
    @keyframes stepBounce { 0% { transform: scale(0.7); opacity: 0; } 60% { transform: scale(1.1); } 100% { transform: scale(1); opacity: 1; } }
    .step-container { display: inline-block; background: var(--caramel); color: white; font-size: 13px; font-weight: 700; padding: 6px 16px; border-radius: 20px; margin-bottom: 12px; letter-spacing: 1px; }
    .step-number { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--text-secondary); margin-bottom: 8px; font-weight: 700; }
    .step-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; color: var(--boba-brown); }
    .step-desc { font-size: 16px; line-height: 1.7; color: var(--text-primary); text-align: left; background: var(--bg); border-radius: 12px; padding: 16px; min-height: 80px; }
    .step-image { margin-top: 12px; border-radius: 12px; max-width: 100%; max-height: 200px; object-fit: cover; display: none; }
    .step-image.visible { display: block; }
    .speak-indicator { font-size: 13px; color: var(--caramel); margin-bottom: 16px; height: 20px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .speak-indicator.speaking { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .nav-buttons { display: flex; flex-direction: column; gap: 12px; }
    .btn-primary { background: var(--boba-brown); color: var(--white); border: none; padding: 18px; border-radius: 14px; font-size: 18px; font-weight: 700; font-family: inherit; cursor: pointer; transition: transform 0.1s, background 0.2s; }
    .btn-primary:active { transform: scale(0.97); background: #4a3530; }
    .btn-secondary { background: none; border: 2px solid var(--border); color: var(--text-secondary); padding: 14px; border-radius: 12px; font-size: 15px; font-family: inherit; cursor: pointer; transition: all 0.2s; }
    .btn-secondary:active { background: rgba(0,0,0,0.05); }
    .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Complete Page */
    .complete-page { padding: 60px 24px; text-align: center; }
    .complete-icon { font-size: 100px; margin-bottom: 24px; animation: bounce 0.6s ease-out; }
    @keyframes bounce { 0% { transform: scale(0); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
    .complete-title { font-size: 28px; font-weight: 700; color: var(--boba-brown); margin-bottom: 12px; }
    .complete-subtitle { font-size: 16px; color: var(--text-secondary); margin-bottom: 40px; }
    .complete-buttons { display: flex; flex-direction: column; gap: 12px; }
    .btn-complete { background: var(--boba-brown); color: var(--white); border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; transition: transform 0.1s; }
    .btn-complete:active { transform: scale(0.97); }
    .btn-outline { background: none; border: 2px solid var(--caramel); color: var(--boba-brown); padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; }

    /* Add/Edit Page */
    .edit-page { padding: 20px; }
    .edit-section { background: var(--card-bg); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); margin-bottom: 20px; }
    .edit-section-title { font-weight: 700; font-size: 16px; margin-bottom: 16px; color: var(--boba-brown); display: flex; align-items: center; justify-content: space-between; }
    .edit-label { font-size: 13px; color: var(--text-secondary); font-weight: 500; margin-bottom: 6px; }
    .edit-input { background: var(--bg); border: 2px solid transparent; border-radius: 10px; padding: 12px 14px; font-size: 15px; font-family: inherit; width: 100%; margin-bottom: 12px; outline: none; transition: border-color 0.2s; }
    .edit-input:focus { border-color: var(--caramel); }
    .edit-input-row { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
    .edit-input-row .edit-input { margin-bottom: 0; flex: 1; }
    .step-edit-card { background: var(--bg); border-radius: 12px; padding: 16px; margin-bottom: 12px; position: relative; }
    .step-edit-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .step-edit-num { font-weight: 700; color: var(--boba-brown); font-size: 14px; }
    .step-edit-delete { background: none; border: none; color: var(--danger); font-size: 13px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
    .step-edit-delete:active { background: rgba(0,0,0,0.1); }
    .img-upload-box { border: 2px dashed #d4c4b7; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; margin-top: 8px; transition: border-color 0.2s; position: relative; }
    .img-upload-box:hover { border-color: var(--caramel); }
    .img-upload-box input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .img-upload-preview { max-width: 100%; max-height: 150px; border-radius: 8px; margin-top: 8px; display: none; }
    .img-upload-preview.visible { display: block; }
    .img-upload-hint { font-size: 13px; color: var(--text-secondary); }
    .img-remove-btn { background: var(--danger); color: white; border: none; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; margin-top: 6px; display: none; }
    .img-remove-btn.visible { display: inline-block; }
    .icon-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .icon-option { font-size: 28px; padding: 8px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
    .icon-option:hover { background: var(--bg); }
    .icon-option.selected { border-color: var(--caramel); background: rgba(212,165,116,0.15); }
    .btn-add-step { width: 100%; background: none; border: 2px dashed #d4c4b7; color: var(--text-secondary); padding: 14px; border-radius: 12px; font-size: 15px; font-family: inherit; cursor: pointer; transition: all 0.2s; }
    .btn-add-step:active { background: rgba(0,0,0,0.05); }
    .btn-save { width: 100%; background: var(--boba-brown); color: var(--white); border: none; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 8px; }
    .btn-save:active { background: #4a3530; }
    .btn-cancel { width: 100%; background: none; border: 2px solid var(--border); color: var(--text-secondary); padding: 14px; border-radius: 14px; font-size: 15px; font-family: inherit; cursor: pointer; margin-top: 10px; }
    .empty-steps { text-align: center; padding: 24px; color: var(--text-secondary); font-size: 14px; }

    /* Toast */
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--boba-brown); color: var(--white); padding: 12px 24px; border-radius: 24px; font-size: 14px; opacity: 0; transition: all 0.3s ease; pointer-events: none; z-index: 200; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Confirm dialog */
    .confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; }
    .confirm-overlay.active { display: flex; }
    .confirm-box { background: var(--card-bg); border-radius: 16px; padding: 24px; max-width: 320px; width: 100%; text-align: center; }
    .confirm-title { font-weight: 700; font-size: 17px; margin-bottom: 8px; }
    .confirm-msg { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-yes { flex: 1; background: var(--danger); color: white; border: none; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 500; font-family: inherit; cursor: pointer; }
    .confirm-no { flex: 1; background: var(--bg); color: var(--text-primary); border: none; padding: 12px; border-radius: 10px; font-size: 15px; font-family: inherit; cursor: pointer; }
  </style>
</head>
<body>

<header class="header" id="header">
  <button class="header-back" id="backBtn" style="display:none;">←</button>
  <div>
    <div class="header-title" id="headerTitle">🧋 奶茶调配助手</div>
    <div class="header-subtitle" id="headerSubtitle"></div>
  </div>
  <button class="header-add" id="soundBtn" onclick="toggleSound()" title="声音设置">🔊</button>
  <button class="header-theme" id="themeBtn" onclick="toggleTheme()" title="切换主题">🌙</button>
  <button class="header-add" id="addBtn" onclick="showAddPage()">＋</button>
  <button class="header-add" id="syncBtn" onclick="showSyncMenu()" style="font-size:18px;">☰</button>
</header>

<!-- Home Page -->
<div class="page active" id="homePage">
  <div class="home-page">
    <div class="search-enhance">
      <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索饮品...">
      <button class="filter-btn" id="filterBtn" onclick="toggleFilterPanel()">☰ 筛选</button>
    </div>
    <div class="category-filter-panel" id="filterPanel"></div>
    <div id="drinkList"></div>
    <div class="footer-status">已收录 <span id="drinkCount">0</span> 款饮品配方</div>
  </div>
</div>

<!-- Temp Choice Page -->
<div class="page" id="tempPage">
  <div class="step-page">
    <div class="step-card" style="padding: 40px 24px;">
      <div class="step-number" id="tempDrinkName" style="font-size: 24px; margin-bottom: 24px;">选择温度</div>
      <div id="tempChoiceList" style="display: flex; flex-direction: column; gap: 12px;"></div>
    </div>
    <div class="nav-buttons" style="margin-top: 24px;">
      <button class="btn-secondary" onclick="goHome()">← 返回</button>
    </div>
  </div>
</div>

<!-- Step Page -->
<div class="page" id="stepPage">
  <div class="step-page">
    <div class="progress-bar" id="progressBar"></div>
    <div class="step-card">
      <div class="step-container" id="stepContainer">冷饮杯</div>
      <div class="step-number" id="stepNumber">第 1 步</div>
      <div class="step-desc" id="stepDesc" style="font-size: 18px; min-height: 120px;">步骤描述</div>
      <img class="step-image" id="stepImage" src="" alt="">
    </div>
    <div class="speak-indicator" id="speakIndicator">🔊 即将朗读...</div>
    <div class="nav-buttons">
      <button class="btn-primary" id="nextBtn" onclick="nextStep()">下一步 →</button>
      <button class="btn-secondary" id="prevBtn" onclick="prevStep()" disabled>⏮ 上一步</button>
    </div>
  </div>
</div>

<!-- Complete Page -->
<div class="page" id="completePage">
  <div class="complete-page">
    <div class="complete-icon">🎉</div>
    <div class="complete-title">制作完成！</div>
    <div class="complete-subtitle" id="completeSubtitle">珍珠奶茶 已完成</div>
    <div class="complete-buttons">
      <button class="btn-complete" onclick="restartDrink()">🔄 再做一杯</button>
      <button class="btn-outline" onclick="goHome()">🏠 返回首页</button>
    </div>
  </div>
</div>

<!-- Add/Edit Page -->
<div class="page" id="editPage">
  <div class="edit-page">
    <div class="edit-section">
      <div class="edit-section-title">🍵 饮品信息</div>
      <div class="edit-label">饮品名称 *</div>
      <input type="text" class="edit-input" id="editName" placeholder="例如：珍珠奶茶">
      <div class="edit-label">分类</div>
      <input type="text" class="edit-input" id="editCategory" placeholder="例如：经典奶茶">
      <div class="edit-label">选择图标</div>
      <div class="icon-picker" id="iconPicker"></div>
    </div>

    <div class="edit-section">
      <div class="edit-section-title">📝 调制步骤 <span id="stepCount" style="font-weight:400;color:var(--text-light);font-size:13px;"></span></div>
      <div style="background:var(--bg);padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:13px;color:var(--text-secondary);">💡 提示：同一容器的操作合并为一个步骤，如"雪克杯"里加糖浆+茶汤+摇匀</div>
      <div id="stepEditList"></div>
      <button class="btn-add-step" id="addStepBtn" onclick="addStep()">＋ 添加步骤</button>
    </div>

    <button class="btn-save" id="saveBtn" onclick="saveDrink()">💾 保存饮品</button>
    <button class="btn-cancel" onclick="cancelEdit()">取消</button>
  </div>
</div>

<!-- Confirm Dialog -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-title" id="confirmTitle">确认删除？</div>

  {id:"抹茶拿铁-hot",name:"抹茶拿铁",category:"无咖啡因拿铁系列",intro:"热",icon:"🥛",steps:[{icon:"🥛",title:"量杯",desc:"加1.5勺抹茶粉，50毫升热水，搅匀。大杯加2勺抹茶粉，66毫升热水，搅匀。"},{icon:"🥛",title:"热饮杯",desc:"中杯倒入特调200毫升，大杯加300毫升。"},{icon:"🥛",title:"热饮杯",desc:"蒸汽棒打发加热。"},{icon:"🥛",title:"量杯",desc:"调料倒入，检查出餐。"}]}
];let drinks = [];
let currentDrink = null;
let currentStep = 0;
let isSpeaking = false;
let editMode = null; // null | 'add' | 'edit'
let editSteps = [];
let selectedIcon = "🧋";

// ====== DOM ======
const homePage = document.getElementById('homePage');

// ====== Init ======
function init() {
  loadDrinks();
  renderDrinkList(drinks);
  drinkCount.textContent = drinks.length;
  buildIconPicker();

  // Check URL params for direct drink open
  const params = new URLSearchParams(window.location.search);
  const drinkId = params.get('drink');
  if (drinkId) {
    // Small delay to ensure page is ready
    setTimeout(() => {
      if (drinks.some(d => d.id === drinkId)) {
        selectDrink(drinkId);
      }
    }, 100);
  }

  updateSoundBtn();
  document.getElementById('soundBtn').style.display = 'block';
  applyTheme();
  buildFilterPanel();

  backBtn.addEventListener('click', () => {
    if (editPage.classList.contains('active')) {
      cancelEdit();

      stopSpeaking();
      goHome();
    }
  });

  searchInput.addEventListener('input', (e) => {
    const q = e.target.value.trim();
    if (!q && !activeCategory) renderDrinkList(drinks);
    else renderDrinkList(filterDrinks(q, activeCategory));
  });
}

function loadDrinks() {
  try {
    const saved = localStorage.getItem('bubble-tea-drinks');
    if (saved && saved.length > 2) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length > 0) {
        drinks = parsed;
      } else {
        drinks = JSON.parse(JSON.stringify(DEFAULT_DRINKS));
        saveDrinks();
      }
    } else {
      drinks = JSON.parse(JSON.stringify(DEFAULT_DRINKS));
      saveDrinks();
    }
  } catch (e) {
    drinks = JSON.parse(JSON.stringify(DEFAULT_DRINKS));
    saveDrinks();
  }
}

function saveDrinks() {
  localStorage.setItem('bubble-tea-drinks', JSON.stringify(drinks));
}

// ====== Render Drink List ======
function filterDrinks(query, category) {
  return drinks.filter(d => {
    const matchQ = !query || d.name.includes(query) || d.category.includes(query) || (d.intro && d.intro.includes(query));
    const matchCat = !category || d.category === category;
    return matchQ && matchCat;
  });
}

function buildFilterPanel() {
  const cats = [...new Set(drinks.map(d => d.category))].sort();
  const panel = document.getElementById('filterPanel');
  panel.innerHTML = `<button class="filter-chip${activeCategory === '' ? ' selected' : ''}" onclick="setCategory('')">全部</button>` +
    cats.map(c => `<button class="filter-chip${activeCategory === c ? ' selected' : ''}" onclick="setCategory('${c}')">${c}</button>`).join('');
}

function setCategory(cat) {
  activeCategory = cat;
  filterOpen = false;
  document.getElementById('filterPanel').classList.remove('open');
  document.getElementById('filterBtn').classList.toggle('active', !!cat);
  buildFilterPanel();
  const q = searchInput.value.trim();
  renderDrinkList(filterDrinks(q, cat));
}
function toggleFilterPanel() {
  filterOpen = !filterOpen;
  document.getElementById('filterPanel').classList.toggle('open', filterOpen);
}
function renderDrinkList(list) {
  // Separate favorites
  const favList = list.filter(d => favoriteIds.includes(d.id));
  const normalList = list.filter(d => !favoriteIds.includes(d.id));

  if (list.length === 0) {
    drinkList.innerHTML = '<div class="search-no-result"><span>🔍</span>未找到该饮品<br><small style="font-size:13px;color:#8D6E63">试试其他关键词</small></div>';
    return;
  }
  // Deduplicate: merge drinks with same name+category into one entry
  const seen = {};
  const deduped = [];
  normalList.forEach(d => {
    const key = d.category + '||' + d.name;
    if (!seen[key]) { seen[key] = true; deduped.push(d); }
  });
  const grouped = {};
  deduped.forEach(d => {
    if (!grouped[d.category]) grouped[d.category] = [];
    grouped[d.category].push(d);
  });
  let html = '';
  if (favList.length > 0) {
    html += '<div class="fav-section"><div class="fav-section-title">⭐ 我的收藏</div><div class="drink-grid">';
    favList.forEach(d => {
      const isFav = favoriteIds.includes(d.id);
      html += `<div class="fav-drink-card">\n        <span class="fav-drink-icon">${d.icon}</span>\n        <div class="fav-drink-info" onclick="selectDrink('${d.id}')">\n          <div class="fav-drink-name">${d.name}</div>\n        </div>\n        <div class="drink-actions">\n          <button class="fav-btn${isFav ? ' faved' : ''}" onclick="event.stopPropagation();toggleFav('${d.id}')" title="${isFav ? '取消收藏':'收藏'}">${isFav ? '⭐' : '☆'}</button>\n          <button class="edit-btn" onclick="event.stopPropagation();editDrink('${d.id}')" title="编辑">✏️</button>\n          <button class="delete-btn" onclick="event.stopPropagation();deleteDrink('${d.id}')" title="删除">🗑️</button>\n        </div>\n      </div>`;
    });
    html += '</div></div>';
  }
  Object.keys(grouped).forEach(cat => {
    html += `<div class="category"><div class="category-title">○ ${cat}</div><div class="drink-grid">`;
    grouped[cat].forEach(d => {
      const isFav = favoriteIds.includes(d.id);
      html += `<div class="drink-card">\n        <span class="drink-icon">${d.icon}</span>\n        <div class="drink-info" onclick="selectDrink('${d.id}')">\n          <div class="drink-name">${d.name}</div>\n        </div>\n        <div class="drink-actions">\n          <button class="fav-btn${isFav ? ' faved' : ''}" onclick="event.stopPropagation();toggleFav('${d.id}')" title="${isFav ? '取消收藏':'收藏'}">${isFav ? '⭐' : '☆'}</button>\n          <button class="edit-btn" onclick="event.stopPropagation();editDrink('${d.id}')" title="编辑">✏️</button>\n          <button class="delete-btn" onclick="event.stopPropagation();deleteDrink('${d.id}')" title="删除">🗑️</button>\n        </div>\n      </div>`;
    });
    html += '</div></div>';
  });
  drinkList.innerHTML = html;
}

function toggleFav(id) {
  const idx = favoriteIds.indexOf(id);
  if (idx === -1) favoriteIds.push(id);
  else favoriteIds.splice(idx, 1);
  localStorage.setItem('bubble-tea-favorites', JSON.stringify(favoriteIds));
  const q = searchInput.value.trim();
  renderDrinkList(filterDrinks(q, activeCategory));
}

// ====== Select Drink ======
function selectDrink(id) {
  // Find all drinks with same name+category (different temps)
  const drink = drinks.find(d => d.id === id);
  if (!drink) return;

  // Find siblings with same name and category
  const siblings = drinks.filter(d => d.name === drink.name && d.category === drink.category);

  // Hide sound button when entering drink detail
  document.getElementById('soundBtn').style.display = 'none';

  if (siblings.length > 1) {
    // Show temp choice page
    showTempChoice(drink, siblings);
  } else {
    // Direct to step
    currentDrink = drink;
    currentStep = 0;
    showPage('step');
    headerTitle.textContent = currentDrink.name;
    headerSubtitle.textContent = currentDrink.category;
    backBtn.style.display = 'block';
    addBtn.style.display = 'none';
    renderStep();
    autoSpeak();
  }
}

function showTempChoice(drink, siblings) {
  headerTitle.textContent = drink.name;
  headerSubtitle.textContent = drink.category;
  backBtn.style.display = 'block';
  addBtn.style.display = 'none';

  let html = '';
  siblings.forEach(s => {
    const temp = s.intro || '默认';
    html += `<button class="btn-primary" style="font-size:16px;padding:16px;" onclick="startDrink('${s.id}')">${temp}</button>`;
  });
  document.getElementById('tempChoiceList').innerHTML = html;
  document.getElementById('tempDrinkName').textContent = '选择温度：';
  showPage('temp');
}

function startDrink(id) {
  currentDrink = drinks.find(d => d.id === id);
  if (!currentDrink) return;
  currentStep = 0;
  showPage('step');
  headerTitle.textContent = currentDrink.name;
  headerSubtitle.textContent = currentDrink.category;
  renderStep();
  autoSpeak();
  document.getElementById('soundBtn').style.display = 'none';
}

// ====== Render Step ======
function renderStep() {
  const step = currentDrink.steps[currentStep];
  const total = currentDrink.steps.length;

  // 容器名称显示在顶部
  const containerName = step.title && step.title.trim() ? step.title.trim() : '制作中';
  document.getElementById('stepContainer').textContent = containerName;
  document.getElementById('stepNumber').textContent = `第 ${currentStep + 1} / ${total} 步`;
  document.getElementById('stepDesc').textContent = step.desc;

  const img = document.getElementById('stepImage');
  if (step.image) {
    img.src = step.image;
    img.classList.add('visible');
  } else {
    img.classList.remove('visible');
  }

  // Progress dots
  let dots = '';
  for (let i = 0; i < total; i++) {
    let cls = 'progress-dot';
    if (i < currentStep) cls += ' done';
    if (i === currentStep) cls += ' current';
    dots += `<div class="${cls}"></div>`;
  }
  document.getElementById('progressBar').innerHTML = dots;

  // Next button
  const nextBtn = document.getElementById('nextBtn');
  nextBtn.textContent = currentStep === total - 1 ? '🎉 完成！' : '下一步 →';

  // Prev button
  document.getElementById('prevBtn').disabled = currentStep === 0;
}

// ====== Auto Speak ======
let autoSpeakTimer = null;
function autoSpeak() {
  clearTimeout(autoSpeakTimer);
  autoSpeakTimer = setTimeout(() => {
    if (!currentDrink) return;
    const step = currentDrink.steps[currentStep];
    const text = `第 ${currentStep + 1} 步：${step.desc}`;
    speakText(text);
  }, 600);
}

function speakText(text) {
  if (!('speechSynthesis' in window) || soundMuted) return;
  try {
    stopSpeaking();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'zh-CN';
    utterance.rate = 0.9;
    
    // Try to find a voice that matches the gender preference
    const voices = speechSynthesis.getVoices();
    const zhVoices = voices.filter(v => v.lang && v.lang.includes('zh'));
    
    if (zhVoices.length > 0) {
      // Try to find a voice matching gender preference
      let chosen = null;
      if (voiceGender === 'male') {
        chosen = zhVoices.find(v => /male|男/i.test(v.name));
      } else {
        chosen = zhVoices.find(v => /female|女|female/i.test(v.name));
      }
      // Fallback to any zh voice if gender match not found
      chosen = chosen || zhVoices[0];
      utterance.voice = chosen;
      utterance.pitch = 1.0; // Use voice's natural pitch
    } else {
      // No zh voices available, use pitch fallback
      utterance.pitch = voiceGender === 'male' ? 0.85 : 1.1;
    }
    
    utterance.onstart = () => {
      isSpeaking = true;
      const ind = document.getElementById('speakIndicator');
      if (ind) { ind.textContent = '🔊 朗读中...'; ind.classList.add('speaking'); }
    };
    utterance.onend = () => {
      isSpeaking = false;
      const ind = document.getElementById('speakIndicator');
      if (ind) { ind.textContent = ''; ind.classList.remove('speaking'); }
    };
    utterance.onerror = (e) => {
      isSpeaking = false;
      const ind = document.getElementById('speakIndicator');
      if (ind) { ind.textContent = ''; ind.classList.remove('speaking'); }
      console.warn('Speech synthesis error:', e);
    };
    
    speechSynthesis.speak(utterance);
  } catch (e) {
    console.warn('Speech synthesis error:', e);
  }
}

// Ensure voices are loaded (some browsers load asynchronously)
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

function stopSpeaking() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  isSpeaking = false;
  const ind = document.getElementById('speakIndicator');
  if (ind) { ind.textContent = ''; ind.classList.remove('speaking'); }
}

// ====== Navigation ======
function nextStep() {
  stopSpeaking();
  if (currentStep < currentDrink.steps.length - 1) {
    currentStep++;
    renderStep();
    autoSpeak();
  } else {
    showPage('complete');
    headerTitle.textContent = '🧋 奶茶调配助手';
    headerSubtitle.textContent = '';
    backBtn.style.display = 'none';
    addBtn.style.display = 'block';
    document.getElementById('completeSubtitle').textContent = `${currentDrink.name} 已完成`;
  }
}

function prevStep() {
  stopSpeaking();
  if (currentStep > 0) {
    currentStep--;
    renderStep();
    autoSpeak();
  }
}

function restartDrink() {
  if (currentDrink) {
    stopSpeaking();
    currentStep = 0;
    showPage('step');
    renderStep();
    headerTitle.textContent = currentDrink.name;
    headerSubtitle.textContent = currentDrink.category;
    backBtn.style.display = 'block';
    addBtn.style.display = 'none';
    autoSpeak();
  }
}

function goHome() {
  stopSpeaking();
  showPage('home');
  headerTitle.textContent = '🧋 奶茶调配助手';
  headerSubtitle.textContent = '';
  backBtn.style.display = 'none';
  addBtn.style.display = 'block';
  document.getElementById('soundBtn').style.display = 'block';
  searchInput.value = '';
  renderDrinkList(drinks);
}

function showPage(page) {
  homePage.classList.remove('active');
  stepPage.classList.remove('active');
  completePage.classList.remove('active');
  editPage.classList.remove('active');
  tempPage.classList.remove('active');
  if (page === 'home') homePage.classList.add('active');
  else if (page === 'step') stepPage.classList.add('active');
  else if (page === 'complete') completePage.classList.add('active');
  else if (page === 'edit') editPage.classList.add('active');
  else if (page === 'temp') tempPage.classList.add('active');
}

// ====== Icon Picker ======
function buildIconPicker() {
  const picker = document.getElementById('iconPicker');
  picker.innerHTML = ICONS.map(icon => `<div class="icon-option${icon === selectedIcon ? ' selected' : ''}" onclick="selectIcon('${icon}')">${icon}</div>`).join('');
}

function selectIcon(icon) {
  selectedIcon = icon;
  document.querySelectorAll('.icon-option').forEach(el => {
    el.classList.toggle('selected', el.textContent === icon);
  });
}

// ====== Add/Edit Page ======
function showAddPage() {
  editMode = 'add';
  editSteps = [{ icon: '🍵', title: '', desc: '', image: null }];
  selectedIcon = '🧋';
  document.getElementById('editName').value = '';
  document.getElementById('editCategory').value = '';
  buildIconPicker();
  renderStepEdits();
  showPage('edit');
  backBtn.style.display = 'block';
  addBtn.style.display = 'none';
  headerTitle.textContent = '＋ 新增饮品';
}

function editDrink(id) {
  const drink = drinks.find(d => d.id === id);
  if (!drink) return;
  editMode = 'edit';
  editSteps = JSON.parse(JSON.stringify(drink.steps));
  selectedIcon = drink.icon;
  document.getElementById('editName').value = drink.name;
  document.getElementById('editCategory').value = drink.category;
  buildIconPicker();
  renderStepEdits();
  showPage('edit');
  backBtn.style.display = 'block';
  addBtn.style.display = 'none';
  headerTitle.textContent = '✏️ 编辑饮品';
}

function renderStepEdits() {
  const list = document.getElementById('stepEditList');
  document.getElementById('stepCount').textContent = `${editSteps.length} 步`;

  if (editSteps.length === 0) {
    list.innerHTML = '<div class="empty-steps">还没有步骤，添加一个吧</div>';
    return;
  }

  list.innerHTML = editSteps.map((s, i) => `
    <div class="step-edit-card" data-index="${i}">
      <div class="step-edit-header">
        <span class="step-edit-num">📦 步骤 ${i + 1}</span>
        <button class="step-edit-delete" onclick="deleteStep(${i})">删除</button>
      </div>
      <div style="background:var(--caramel);color:white;padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:14px;font-weight:500;">
        🫗 容器：<input type="text" style="background:transparent;border:none;color:white;font-size:14px;font-weight:700;outline:none;width:60%;" placeholder="例如：雪克杯、量杯、冷饮杯、出品杯" value="${escHtml(s.title)}" onchange="editSteps[${i}].title=this.value">
      </div>
      <div class="edit-label">📝 这一步做什么</div>
      <input type="text" class="edit-input" placeholder="合并同一容器的操作，写清楚加什么、加多少" value="${escHtml(s.desc)}" onchange="editSteps[${i}].desc=this.value">
    </div>
  `).join('');
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectStepIcon(index, icon) {
  editSteps[index].icon = icon;
  const picker = document.getElementById('stepIconPicker' + index);
  picker.querySelectorAll('.icon-option').forEach(el => {
    el.classList.toggle('selected', el.textContent === icon);
  });
}

function handleImageUpload(index, file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    editSteps[index].image = e.target.result;
    const preview = document.getElementById('imgPreview' + index);
    const hint = document.getElementById('imgHint' + index);
    const removeBtn = document.getElementById('imgRemove' + index);
    preview.src = e.target.result;
    preview.classList.add('visible');
    hint.style.display = 'none';
    removeBtn.classList.add('visible');
  };
  reader.readAsDataURL(file);
}

function removeStepImage(index) {
  editSteps[index].image = null;
  const preview = document.getElementById('imgPreview' + index);
  const hint = document.getElementById('imgHint' + index);
  const removeBtn = document.getElementById('imgRemove' + index);
  preview.src = '';
  preview.classList.remove('visible');
  hint.style.display = '';
  removeBtn.classList.remove('visible');
  preview.parentElement.querySelector('input').value = '';
}

function addStep() {
  editSteps.push({ icon: '🍵', title: '', desc: '', image: null });
  renderStepEdits();
}

function deleteStep(index) {
  if (editSteps.length <= 1) {
    showToast('至少需要 1 个步骤');
    return;
  }
  editSteps.splice(index, 1);
  renderStepEdits();
}

function saveDrink() {
  const name = document.getElementById('editName').value.trim();
  const category = document.getElementById('editCategory').value.trim() || '自选';


  if (!name) { showToast('请输入饮品名称'); return; }

  // Validate steps
  const validSteps = editSteps.filter(s => s.title.trim() || s.desc.trim());
  if (validSteps.length === 0) { showToast('请至少填写 1 个步骤'); return; }


  const drink = {
    id: editMode === 'edit' ? currentDrink.id : 'custom-' + Date.now(),
    name,
    category,
    intro: '',
    icon: selectedIcon,
    steps: editSteps.filter(s => s.title.trim() || s.desc.trim())
  };

  if (editMode === 'edit') {
    const idx = drinks.findIndex(d => d.id === currentDrink.id);
    if (idx !== -1) drinks[idx] = drink;
  } else {
    drinks.push(drink);
  }

  saveDrinks();
  drinkCount.textContent = drinks.length;
  showToast(editMode === 'edit' ? '已更新！' : '已保存！');
  goHome();
}

function cancelEdit() {
  showPage('home');
  headerTitle.textContent = '🧋 奶茶调配助手';
  backBtn.style.display = 'none';
  addBtn.style.display = 'block';
  renderDrinkList(drinks);
}

// ====== Delete ======
function deleteDrink(id) {
  const drink = drinks.find(d => d.id === id);
  if (!drink) return;
  showConfirm(`确认删除「${drink.name}」？`, `删除后无法恢复。`, () => {
    drinks = drinks.filter(d => d.id !== id);
    saveDrinks();
    drinkCount.textContent = drinks.length;
    renderDrinkList(drinks);
    showToast('已删除');
  });
}

// ====== Confirm Dialog ======
function showConfirm(title, msg, callback) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMsg').textContent = msg;
  document.getElementById('confirmOverlay').classList.add('active');
  confirmCallback = callback;
}

function confirmNo() {
  document.getElementById('confirmOverlay').classList.remove('active');
  confirmCallback = null;
}

function confirmYes() {
  document.getElementById('confirmOverlay').classList.remove('active');
  if (confirmCallback) confirmCallback();
  confirmCallback = null;
}

// ====== Toast ======
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2500);
}

// ====== Sync Menu ======
function showSyncMenu() {
  document.getElementById('syncOverlay').classList.add('active');
}

function closeSyncMenu() {
  document.getElementById('syncOverlay').classList.remove('active');
}

function exportDrinks() {
  closeSyncMenu();
  const data = localStorage.getItem('bubble-tea-drinks');
  if (!data) { showToast('暂无本地数据'); return; }
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'my-bubble-tea-recipes.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('已导出配方文件！');
}

function importDrinks(file) {
  closeSyncMenu();
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('格式错误');
      // Merge: add imported drinks that don't exist
      const existingIds = drinks.map(d => d.id);
      let added = 0;
      imported.forEach(d => {
        if (!existingIds.includes(d.id)) {
          drinks.push(d);
          added++;
        }
      });
      saveDrinks();
      drinkCount.textContent = drinks.length;
      renderDrinkList(drinks);
      showToast(`成功导入 ${added} 个新配方！`);
    } catch (err) {
      showToast('导入失败：文件格式错误');
    }
  };
  reader.readAsText(file);
}

// ====== Sound Settings ======
// ====== Sound Toggle ======
function toggleSound() {
  soundMuted = !soundMuted;
  localStorage.setItem('bubble-tea-sound-muted', soundMuted);
  updateSoundBtn();
  if (!soundMuted) {
    try { speakText('朗读已开启'); } catch (e) {}
  }
}

function updateSoundBtn() {
  const btn = document.getElementById('soundBtn');
  btn.textContent = soundMuted ? '🔇' : '🔊';
}

// ====== Theme Toggle ======
function toggleTheme() {
  theme = theme === 'light' ? 'dark' : 'light';
  localStorage.setItem('bubble-tea-theme', theme);
  applyTheme();
}

function applyTheme() {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
}

// ====== Start ======
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
init();
</script>
</body>
</html>
