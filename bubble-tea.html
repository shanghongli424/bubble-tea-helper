<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🧋 奶茶调配助手</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --boba-brown: #5D4037;
      --cream: #FFF8F0;
      --caramel: #D4A574;
      --tea-green: #7CB342;
      --taro-purple: #9C6ADE;
      --matcha: #8BC34A;
      --mango: #FFB300;
      --text-dark: #3E2723;
      --text-light: #8D6E63;
      --white: #FFFFFF;
      --shadow: 0 4px 12px rgba(93, 64, 55, 0.15);
      --shadow-hover: 0 8px 24px rgba(93, 64, 55, 0.2);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Noto Sans SC', system-ui, sans-serif;
      background: var(--cream);
      color: var(--text-dark);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ====== Header ====== */
    .header {
      background: var(--white);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 2px solid var(--caramel);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-back {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
      margin: -8px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .header-back:active {
      background: rgba(93, 64, 55, 0.1);
    }

    .header-title {
      flex: 1;
      font-weight: 700;
      font-size: 18px;
    }

    .header-subtitle {
      font-size: 13px;
      color: var(--text-light);
      font-weight: 400;
    }

    /* ====== Page Container ====== */
    .page {
      display: none;
      animation: fadeIn 0.3s ease-out;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* ====== Home Page ====== */
    .home-page {
      padding: 20px;
    }

    .search-box {
      background: var(--white);
      border: 2px solid transparent;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      font-family: inherit;
      width: 100%;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
      outline: none;
    }

    .search-box:focus {
      border-color: var(--caramel);
    }

    .category {
      margin-bottom: 28px;
    }

    .category-title {
      font-size: 14px;
      color: var(--text-light);
      font-weight: 500;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .drink-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .drink-card {
      background: var(--white);
      border-radius: 16px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.15s, box-shadow 0.15s;
      border: none;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .drink-card:active {
      transform: scale(0.98);
      box-shadow: var(--shadow-hover);
    }

    .drink-icon {
      font-size: 36px;
      flex-shrink: 0;
    }

    .drink-info {
      flex: 1;
    }

    .drink-name {
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 4px;
    }

    .drink-intro {
      font-size: 13px;
      color: var(--text-light);
    }

    .drink-arrow {
      font-size: 20px;
      color: var(--caramel);
    }

    .no-result {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-light);
    }

    .footer-status {
      text-align: center;
      padding: 24px;
      font-size: 13px;
      color: var(--text-light);
    }

    /* ====== Step Page ====== */
    .step-page {
      padding: 20px;
    }

    .progress-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 28px;
    }

    .progress-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #d4c4b7;
      transition: all 0.3s ease;
    }

    .progress-dot.done {
      background: var(--caramel);
      width: 8px;
      height: 8px;
    }

    .progress-dot.current {
      background: var(--boba-brown);
      width: 14px;
      height: 14px;
    }

    .step-card {
      background: var(--white);
      border-radius: 20px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
    }

    .step-icon {
      font-size: 72px;
      margin-bottom: 16px;
      display: block;
      animation: stepBounce 0.4s ease-out;
    }

    @keyframes stepBounce {
      0% { transform: scale(0.7); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    .step-number {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      color: var(--text-light);
      margin-bottom: 8px;
      font-weight: 700;
    }

    .step-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--boba-brown);
    }

    .step-desc {
      font-size: 16px;
      line-height: 1.7;
      color: var(--text-dark);
      text-align: left;
      background: var(--cream);
      border-radius: 12px;
      padding: 16px;
    }

    .step-image {
      margin-top: 16px;
      border-radius: 12px;
      max-width: 100%;
      display: none;
    }

    .step-image.visible {
      display: block;
    }

    .speak-btn {
      background: none;
      border: 2px solid var(--caramel);
      color: var(--boba-brown);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 20px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .speak-btn:active {
      background: var(--caramel);
      color: var(--white);
    }

    .speak-btn.speaking {
      background: var(--caramel);
      color: var(--white);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212, 165, 116, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(212, 165, 116, 0); }
    }

    .nav-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-primary {
      background: var(--boba-brown);
      color: var(--white);
      border: none;
      padding: 18px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
    }

    .btn-primary:active {
      transform: scale(0.97);
      background: #4a3530;
    }

    .btn-secondary {
      background: none;
      border: 2px solid #d4c4b7;
      color: var(--text-light);
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:active {
      background: rgba(93, 64, 55, 0.05);
    }

    .btn-secondary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ====== Complete Page ====== */
    .complete-page {
      padding: 60px 24px;
      text-align: center;
    }

    .complete-icon {
      font-size: 100px;
      margin-bottom: 24px;
      animation: bounce 0.6s ease-out;
    }

    @keyframes bounce {
      0% { transform: scale(0); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .complete-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--boba-brown);
      margin-bottom: 12px;
    }

    .complete-subtitle {
      font-size: 16px;
      color: var(--text-light);
      margin-bottom: 40px;
    }

    .complete-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn-complete {
      background: var(--boba-brown);
      color: var(--white);
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .btn-complete:active {
      transform: scale(0.97);
    }

    .btn-outline {
      background: none;
      border: 2px solid var(--caramel);
      color: var(--boba-brown);
      padding: 14px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
    }

    /* ====== Toast ====== */
    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--boba-brown);
      color: var(--white);
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
      z-index: 200;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ====== Category Divider ====== */
    .wave-divider {
      text-align: center;
      margin: 8px 0;
      color: #d4c4b7;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header" id="header">
    <button class="header-back" id="backBtn" style="display:none;">←</button>
    <div>
      <div class="header-title" id="headerTitle">🧋 奶茶调配助手</div>
      <div class="header-subtitle" id="headerSubtitle"></div>
    </div>
  </header>

  <!-- Home Page -->
  <div class="page active" id="homePage">
    <div class="home-page">
      <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜索饮品...">
      <div id="drinkList"></div>
      <div class="footer-status">已收录 <span id="drinkCount">0</span> 款饮品配方</div>
    </div>
  </div>

  <!-- Step Page -->
  <div class="page" id="stepPage">
    <div class="step-page">
      <div class="progress-bar" id="progressBar"></div>
      <div class="step-card">
        <span class="step-icon" id="stepIcon">🍵</span>
        <div class="step-number" id="stepNumber">第 1 步</div>
        <div class="step-title" id="stepTitle">步骤标题</div>
        <div class="step-desc" id="stepDesc">步骤描述</div>
      </div>
      <div style="text-align:center;">
        <button class="speak-btn" id="speakBtn" onclick="speakCurrentStep()">
          🔊 朗读步骤
        </button>
      </div>
      <div class="nav-buttons">
        <button class="btn-primary" id="nextBtn" onclick="nextStep()">下一步 →</button>
        <button class="btn-secondary" id="prevBtn" onclick="prevStep()" disabled>⏮ 上一步</button>
      </div>
    </div>
  </div>

  <!-- Complete Page -->
  <div class="page" id="completePage">
    <div class="complete-page">
      <div class="complete-icon">🎉</div>
      <div class="complete-title">制作完成！</div>
      <div class="complete-subtitle" id="completeSubtitle">珍珠奶茶 已完成</div>
      <div class="complete-buttons">
        <button class="btn-complete" onclick="restartDrink()">🔄 再做一杯</button>
        <button class="btn-outline" onclick="goHome()">🏠 返回首页</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

    let currentDrink = null;
    let currentStep = 0;
    let isSpeaking = false;

    // ====== DOM Elements ======
    const homePage = document.getElementById('homePage');
    const stepPage = document.getElementById('stepPage');
    const completePage = document.getElementById('completePage');
    const backBtn = document.getElementById('backBtn');
    const headerTitle = document.getElementById('headerTitle');

    const searchInput = document.getElementById('searchInput');
    const drinkList = document.getElementById('drinkList');
    const drinkCount = document.getElementById('drinkCount');

    // ====== Init ======
    function init() {
      renderDrinkList(drinks);
      drinkCount.textContent = drinks.length;

      backBtn.addEventListener('click', () => {
        if (stepPage.classList.contains('active')) {
          goHome();
        }
      });

      searchInput.addEventListener('input', (e) => {
        const query = e.target.value.trim();
        if (query === '') {
          renderDrinkList(drinks);
        } else {
          const filtered = drinks.filter(d =>
            d.name.includes(query) || d.category.includes(query)
          );
          renderDrinkList(filtered);
        }
      });
    }

    // ====== Render Drink List ======
    function renderDrinkList(list) {
      if (list.length === 0) {
        drinkList.innerHTML = '<div class="no-result">未找到该饮品 😅</div>';
        return;
      }

      const grouped = {};
      list.forEach(d => {
        if (!grouped[d.category]) grouped[d.category] = [];
        grouped[d.category].push(d);
      });

      let html = '';
      Object.keys(grouped).forEach(cat => {
        html += `<div class="category">
          <div class="category-title">○ ${cat}</div>
          <div class="drink-grid">`;
        grouped[cat].forEach(d => {
          html += `<button class="drink-card" onclick="selectDrink('${d.id}')">
            <span class="drink-icon">${d.icon}</span>
            <div class="drink-info">
              <div class="drink-name">${d.name}</div>
              <div class="drink-intro">${d.intro}</div>
            </div>
            <span class="drink-arrow">›</span>
          </button>`;
        });
        html += '</div></div>';
      });

      drinkList.innerHTML = html;
    }

    // ====== Select Drink ======
    function selectDrink(id) {
      currentDrink = drinks.find(d => d.id === id);
      if (!currentDrink) return;

      currentStep = 0;
      showPage('step');
      headerTitle.textContent = currentDrink.name;
      headerSubtitle.textContent = `${currentDrink.category}`;
      backBtn.style.display = 'block';
      renderStep();
    }

    // ====== Render Step ======
    function renderStep() {
      const step = currentDrink.steps[currentStep];
      const total = currentDrink.steps.length;

      // Icon
      document.getElementById('stepIcon').textContent = step.icon;

      // Number
      document.getElementById('stepNumber').textContent = `第 ${currentStep + 1} / ${total} 步`;

      // Title & Desc
      document.getElementById('stepTitle').textContent = step.title;
      document.getElementById('stepDesc').textContent = step.desc;

      // Progress dots
      let dots = '';
      for (let i = 0; i < total; i++) {
        let cls = 'progress-dot';
        if (i < currentStep) cls += ' done';
        if (i === currentStep) cls += ' current';
        dots += `<div class="${cls}"></div>`;
      }
      document.getElementById('progressBar').innerHTML = dots;

      // Next button
      const nextBtn = document.getElementById('nextBtn');
      nextBtn.textContent = currentStep === total - 1 ? '🎉 完成！' : '下一步 →';

      // Prev button
      document.getElementById('prevBtn').disabled = currentStep === 0;
    }

    // ====== Navigation ======
    function nextStep() {
      if (currentStep < currentDrink.steps.length - 1) {
        currentStep++;
        renderStep();
      } else {
        // Done
        showPage('complete');
        headerTitle.textContent = '🧋 奶茶调配助手';
        headerSubtitle.textContent = '';
        backBtn.style.display = 'none';
        document.getElementById('completeSubtitle').textContent = `${currentDrink.name} 已完成`;
        stopSpeaking();
      }
    }

    function prevStep() {
      if (currentStep > 0) {
        currentStep--;
        renderStep();
      }
    }

    // ====== Restart / Home ======
    function restartDrink() {
      if (currentDrink) {
        currentStep = 0;
        showPage('step');
        renderStep();
        headerTitle.textContent = currentDrink.name;
        headerSubtitle.textContent = currentDrink.category;
        backBtn.style.display = 'block';
      }
    }

    function goHome() {
      stopSpeaking();
      showPage('home');
      headerTitle.textContent = '🧋 奶茶调配助手';
      headerSubtitle.textContent = '';
      backBtn.style.display = 'none';
      searchInput.value = '';
      renderDrinkList(drinks);
    }

    // ====== Show Page ======
    function showPage(page) {
      homePage.classList.remove('active');
      stepPage.classList.remove('active');
      completePage.classList.remove('active');

      if (page === 'home') homePage.classList.add('active');
      else if (page === 'step') stepPage.classList.add('active');
      else if (page === 'complete') completePage.classList.add('active');
    }

    // ====== Text-to-Speech ======
    function speakCurrentStep() {
      if (!('speechSynthesis' in window)) {
        showToast('您的浏览器不支持语音朗读');
        return;
      }

      const step = currentDrink.steps[currentStep];
      const text = `第 ${currentStep + 1} 步：${step.title}。${step.desc}`;

      if (isSpeaking) {
        stopSpeaking();
        return;
      }

      stopSpeaking();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'zh-CN';
      utterance.rate = 0.85;
      utterance.pitch = 1.1;

      utterance.onstart = () => {
        isSpeaking = true;
        document.getElementById('speakBtn').classList.add('speaking');
        document.getElementById('speakBtn').textContent = '🔊 朗读中...';
      };

      utterance.onend = () => {
        isSpeaking = false;
        document.getElementById('speakBtn').classList.remove('speaking');
        document.getElementById('speakBtn').textContent = '🔊 朗读步骤';
      };

      utterance.onerror = () => {
        isSpeaking = false;
        document.getElementById('speakBtn').classList.remove('speaking');
        document.getElementById('speakBtn').textContent = '🔊 朗读步骤';
      };

      setTimeout(() => speechSynthesis.speak(utterance), 50);
    }

    function stopSpeaking() {
      if ('speechSynthesis' in window) {
        speechSynthesis.cancel();
      }
      isSpeaking = false;
      const btn = document.getElementById('speakBtn');
      if (btn) {
        btn.classList.remove('speaking');
        btn.textContent = '🔊 朗读步骤';
      }
    }

    // ====== Toast ======
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // ====== Start ======
    init();
  </script>
</body>
</html>
